spring:
  datasource:
    # 使用 H2 内存模式，DB_CLOSE_DELAY=-1 保证在测试期间数据库不被关闭
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # 测试完成后自动销毁表结构
  sql:
    init:
      mode: never
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 2592000
          cache-public: true

server:
  address: 0.0.0.0
  port: 8080

jwt:
  secret: "at-least-32-character-long-secret-key-for-security"
  expiration: 2592000000 # 30 days in ms

r2:
  access-key: "123456"
  secret-key: "123456"
  endpoint: "https://ryansu.uk"
  bucket-name: coollib-review