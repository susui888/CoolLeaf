spring:
  application:
    name: CoolLeaf
  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.2.18}:${DB_PORT:5433}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    rest:
      base-path: api/rest
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 2592000
          cache-public: true

server:
  address: 0.0.0.0
  port: 8080

jwt:
  secret: "at-least-32-character-long-secret-key-for-security"
  expiration: 2592000000 # 30 days in ms